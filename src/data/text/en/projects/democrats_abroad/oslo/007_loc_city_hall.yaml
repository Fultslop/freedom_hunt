storyline: |
  Oslo Rådhuset was completed in 1950 — a building process interrupted by occupation and war. Its
  interior contains a vast mural cycle depicting Norwegian history, labour, and society. Since 1990,
  it has hosted the Nobel Peace Prize ceremony every 10 December: the moment when the world's
  attention turns to Oslo, and a name is spoken aloud in a room built by a people who know what it
  costs to lose a democracy.
breadcrumb: |
  Look at the two towers on the main facade. Are they identical? Examine the decorative motifs near
  the top of each. Find one difference before you go inside.
challenge:
  name: ""
  description: |
    Step inside the main hall. Henrik Sørensen's mural cycle covers the walls. Find the section
    depicting Norwegian workers and craftspeople — fishers, farmers, builders, weavers, and more.
    Count how many distinct professions you can identify in the scene.
