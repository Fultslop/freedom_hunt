storyline: |
  Akershus Fortress fell to German forces on 9 April 1940 without a battle — caught in the chaos
  of the invasion. Over the following five years it became a Gestapo prison, a place of torture,
  and an execution ground. Norwegian resistance fighters were shot in its courtyard. In 1945, it was
  here that Vidkun Quisling — the man whose name became a synonym for traitor — was tried by a
  Norwegian court and executed by firing squad.
breadcrumb: |
  Inside the fortress grounds, find the memorial to the Norwegians who were executed here during
  the occupation. Look for a plaque or stone marker near the execution site in the courtyard.
challenge:
  name: ""
  description: |
    Stand in the fortress courtyard. Without checking your phone: how many Norwegian resistance
    fighters do you think were executed at Akershus during the five years of occupation? Write your
    estimate. Then look it up — how close were you? And describe what you can see from where
    you are standing.
  notes: "The actual number executed at Akershus is approximately 42."
