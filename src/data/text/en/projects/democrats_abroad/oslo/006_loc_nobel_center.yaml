storyline: |
  Alfred Nobel left most of his fortune to establish prizes for human achievement — and assigned the
  peace prize specifically to Norway, then not yet independent from Sweden. Since 1901 it has been
  awarded to people and organisations who have worked to reduce armed conflict and build international
  solidarity. The Nobel Peace Center, opened in 2005, tells their stories year-round.
breadcrumb: |
  On the plaza or at the entrance, find the display or banner showing the most recent Nobel Peace
  Prize laureate. Who received it, and for what?
challenge:
  name: ""
  description: |
    Inside the center, find the laureate you know least about — the one whose name means the least
    to you right now. Read their full citation. Write one sentence in your own words explaining why
    the Nobel Committee chose them.
