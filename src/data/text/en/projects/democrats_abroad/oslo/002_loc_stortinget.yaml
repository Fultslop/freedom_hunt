storyline: |
  Norway's constitution, signed at Eidsvoll on 17 May 1814, was among the most liberal in the world
  at the time. It established sovereignty in the people, not the crown. The Stortinget — the Grand
  Assembly — has carried that mandate ever since: through independence from Sweden in 1905, through
  occupation and exile from 1940 to 1945, and back.
breadcrumb: |
  On the façade facing Karl Johans gate, find the two relief panels flanking the main entrance.
  Each depicts a scene from Norwegian civic or political life. Stand in front of one and describe
  what you see.
challenge:
  name: ""
  description: |
    Two relief panels flank the entrance — one on each side. Describe what each scene depicts.
    Then discuss in your group: which panel better represents what a parliament is actually for?
