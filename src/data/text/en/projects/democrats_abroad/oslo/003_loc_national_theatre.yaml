storyline: |
  Henrik Ibsen's plays were political acts in domestic clothing. A Doll's House (1879) argued that
  women are full human beings. An Enemy of the People (1882) argued that a single honest person can
  be right when the crowd is wrong. Peer Gynt asked what it means to be yourself. The National
  Theatre, opened in 1899, was built for exactly this kind of truth-telling: art that names what
  power would prefer to leave unspoken.
breadcrumb: |
  Two bronze statues stand in front of the theatre. One wrote A Doll's House. The other wrote
  Peer Gynt — a different play, a different man. Find both statues before continuing.
challenge:
  name: ""
  description: |
    Read the inscription on one of the two statue pedestals. Then discuss in your group: which of
    Ibsen's recurring themes feels most alive in the world right now? Pick one and commit to it.
