  value: "Norges Hjemmefrontmuseum"
address: "Akershus festning, 0150 Oslo"
coordinates:
  latitude: 59.9089
  longitude: 10.7352
storyline: |
  The Norges Hjemmefrontmuseum sits on the Akershus grounds, in a building used by German
  authorities during the occupation. It documents the full spectrum of Norwegian responses to
  occupation: collaboration, silence, and resistance. The resistance — Milorg — organised more than
  40,000 people by the end of the war. Most of them were ordinary people who decided that some
  things were worth risking their lives for.
breadcrumb: |
  At the museum entrance, look for the date that marks Norway's liberation. What is it?
challenge:
  name: ""
  description: |
    Walk through the museum and find one object, document, or story that you think every democracy
    should know about. Note what it is — and explain in your own words, not the museum's, why it
    matters.
