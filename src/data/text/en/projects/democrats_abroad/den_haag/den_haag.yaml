city.title: "Den Haag"
city.country: "Netherlands"
city.tagline: "Where law meets history"
city.description: |
  YES.WE.VOTE Den Haag is a guided civic route through The Hague’s living arguments about truth,
  memory, protest, records, law, confinement, public space, and the vote.​

  ​You are walking the **Open Court**: the idea that power must answer questions in public, that evidence must
  be examined, that records must be questioned, that names must be said aloud, and that democracy only
  survives when people keep showing up.​

  All teams begin at **The American Book Center**, where participants confirm or begin their 2026 ballot
  request. From there, teams move through a shared central route: banned books, public truth, remembered
  names, a draft manifesto, and women-led protest.​

  At **Malieveld**, the route splits.​

  Both routes end with the same final civic act: teams revise their manifesto, submit their evidence, and bring
  one more voter into the democratic process.​
